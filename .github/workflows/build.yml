name: build
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch: {}
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2
      #- Alternativa: usar setup-dotnet + dotnet build (más portable en GH Actions)
      #- name: Setup .NET
      #- uses: actions/setup-dotnet@v3
      #- with:
      #    dotnet-version: '7.0.x'
      - name: Build
        run: |
          msbuild SWGROI_Server.sln /p:Configuration=Release
      - name: Package artifacts
        run: |
          mkdir artifacts
          powershell -ExecutionPolicy Bypass -File operaciones/release/pack.ps1 -OutDir artifacts
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: swgroi-deploy
          path: artifacts/deploy.zip
      - name: Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/deploy.zip

